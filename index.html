<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Payroll System</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <!-- Prevent the browser from auto-dark-mode-ing the page (which can invert/recolor images) -->
  <meta name="color-scheme" content="light">
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg">
  <!-- iOS support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Payroll">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">

  <!-- Styles -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/employeePortal.css">

  <!-- CDN Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    /* ── Login Screen ── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }

    .login-logo {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 32px;
    }

    #google-signin-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px 20px;
      background: #fff;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #1e293b;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }

    #google-signin-btn:hover {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .google-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    #login-error {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #dc2626;
      min-height: 18px;
    }

    /* ── App Loader ── */
    #app-loader {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      flex-direction: column;
      gap: 16px;
    }

    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loader-msg {
      color: #fff;
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* ── User info in sidebar footer ── */
    .sidebar-user {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-user-avatar-slot {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      position: relative;
    }

    .sidebar-user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .sidebar-user-avatar-placeholder {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #e2e8f0;
      flex-shrink: 0;
    }

    .sidebar-user-info {
      flex: 1;
      min-width: 0;
    }

    .sidebar-user-name {
      font-size: 0.75rem;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-user-email {
      font-size: 0.65rem;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #signout-btn {
      padding: 4px 8px;
      font-size: 0.7rem;
      border-radius: 6px;
      background: transparent;
      border: 1px solid #334155;
      color: #64748b;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }

    #signout-btn:hover {
      background: #334155;
      color: #e2e8f0;
    }
  </style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">💼</div>
    <div class="login-title" data-i18n="login.title">Payroll System</div>
    <div class="login-sub" data-i18n="login.subtitle">Lebanon — Sign in to access payroll data</div>
    <button id="google-signin-btn">
      <svg class="google-icon" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span data-i18n="login.google">Sign in with Google</span>
    </button>

    <div style="display:flex;align-items:center;gap:10px;margin:12px 0;">
      <div style="flex:1;height:1px;background:#e2e8f0;"></div>
      <span style="font-size:0.75rem;color:#94a3b8;" data-i18n="login.or">or</span>
      <div style="flex:1;height:1px;background:#e2e8f0;"></div>
    </div>

    <button id="microsoft-signin-btn">
      <svg class="google-icon" viewBox="0 0 21 21">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      <span data-i18n="login.microsoft">Sign in with Microsoft</span>
    </button>

    <div id="login-error"></div>

    <!-- Language picker -->
    <div id="login-lang-picker" style="margin-top:18px;display:flex;justify-content:center;gap:6px;">
      <!-- Filled by JS -->
    </div>
  </div>
</div>

<!-- ── Onboarding Screen (first-time company setup) ── -->
<div id="onboarding-screen"
  style="display:none;position:fixed;inset:0;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%);
         align-items:center;justify-content:center;z-index:9990;">
</div>

<!-- ── Super Admin Screen (company picker) ── -->
<div id="super-admin-screen"
  style="display:none;position:fixed;inset:0;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%);
         align-items:center;justify-content:center;z-index:9991;overflow-y:auto;">
</div>

<!-- ── Employee Portal Screen (mobile-first, shown to employees only) ── -->
<div id="employee-portal-screen"
  style="display:none;position:fixed;inset:0;z-index:9992;overflow-y:auto;background:#f1f5f9;">
</div>

<!-- ── App Loader ── -->
<div id="app-loader">
  <div class="loader-spinner"></div>
  <div id="loader-msg">Loading payroll data…</div>
</div>

<!-- ── App Shell (hidden until logged in) ── -->
<div class="app-shell" id="app-shell" style="display:none;">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon" id="sidebar-logo-icon">💼</div>
      <div class="sidebar-logo-text">
        <span class="sidebar-logo-title">Payroll System</span>
        <span class="sidebar-logo-sub" id="sidebar-company-name">—</span>
      </div>
      <button class="sidebar-collapse-btn" id="sidebar-collapse-btn" title="Collapse sidebar">&#9776;</button>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-section-label" data-i18n="nav.main">Main</span>
      <a href="#dashboard" class="nav-link active">
        <span class="nav-link-icon">📊</span>
        <span data-i18n="nav.dashboard">Dashboard</span>
      </a>
      <a href="#employees" class="nav-link">
        <span class="nav-link-icon">👥</span>
        <span data-i18n="nav.employees">Employees</span>
      </a>
      <a href="#payroll" class="nav-link">
        <span class="nav-link-icon">💰</span>
        <span data-i18n="nav.payroll">Payroll Report</span>
      </a>
      <a href="#reports" class="nav-link">
        <span class="nav-link-icon">📄</span>
        <span data-i18n="nav.reports">Reports</span>
      </a>
      <a href="#absence-requests" class="nav-link">
        <span class="nav-link-icon">📅</span>
        <span data-i18n="nav.attendance">Attendance Requests</span>
      </a>
      <span class="nav-section-label" style="margin-top:12px;" data-i18n="nav.config">Configuration</span>
      <a href="#settings" class="nav-link">
        <span class="nav-link-icon">⚙️</span>
        <span data-i18n="nav.settings">Settings</span>
      </a>

      <!-- Super admin only -->
      <span class="nav-section-label" id="super-admin-nav-section" style="margin-top:12px;display:none;" data-i18n="nav.admin">Admin</span>
      <a href="#" class="nav-link" id="switch-company-btn" style="display:none;">
        <span class="nav-link-icon">🔧</span>
        <span data-i18n="nav.switch_company">Switch Company</span>
      </a>
    </nav>

    <!-- User info + sign out -->
    <div class="sidebar-user">
      <div class="sidebar-user-avatar-placeholder" id="user-avatar-placeholder">👤</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="user-name">—</div>
        <div class="sidebar-user-email" id="user-email">—</div>
      </div>
      <button id="signout-btn" title="Sign out" data-i18n="nav.signout_short">Out</button>
    </div>
  </aside>

  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Main Content -->
  <main class="main-content">
    <div id="app-content"></div>
  </main>

</div>

<!-- Mobile Bottom Navigation -->
<nav class="mobile-bottom-nav" id="mobile-bottom-nav">
  <a href="#dashboard" class="mobile-nav-item active">
    <span>📊</span>
    <span data-i18n="nav_m.dashboard">Dashboard</span>
  </a>
  <a href="#employees" class="mobile-nav-item">
    <span>👥</span>
    <span data-i18n="nav_m.employees">Employees</span>
  </a>
  <a href="#payroll" class="mobile-nav-item">
    <span>💰</span>
    <span data-i18n="nav_m.payroll">Payroll</span>
  </a>
  <a href="#reports" class="mobile-nav-item">
    <span>📄</span>
    <span data-i18n="nav_m.reports">Reports</span>
  </a>
  <a href="#settings" class="mobile-nav-item">
    <span>⚙️</span>
    <span data-i18n="nav_m.settings">Settings</span>
  </a>
</nav>

<!-- Mobile menu toggle -->
<button class="menu-toggle" id="menu-toggle" aria-label="Open menu">☰</button>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Dialog</span>
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer">
      <button class="btn btn-secondary" id="modal-cancel" data-i18n="common.cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm" data-i18n="common.confirm">Confirm</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container" aria-live="polite"></div>

<!-- App Entry Point -->
<script type="module" src="js/main.js"></script>

</body>
</html>
