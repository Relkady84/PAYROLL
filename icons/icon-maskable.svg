<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background (no rounded corners — the OS applies the mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Briefcase scaled to 60% so it stays inside the safe zone after Android's circle mask -->
  <text x="50%" y="50%" font-size="180" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, system-ui, sans-serif">💼</text>
</svg>
